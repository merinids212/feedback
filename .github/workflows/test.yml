name: tests
on:
  push: {branches: [main]}
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: deps
        run: sudo apt-get update -qq && sudo apt-get install -y -qq zsh
      - name: offline suite (syntax + parse)
        run: bash tests/run_tests.sh --offline
      - name: shellcheck
        run: shellcheck site/install.sh statusline.sh cli/feedback.zsh || true
